services:
  redis:
    image: redis:alpine
    restart: always
    environment:
      - REDIS_PORT=${REDIS_PORT:-6379}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./api
    restart: always
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  worker:
    build: ./worker
    restart: always
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "${FE_PORT:-3000}:${FE_PORT:-3000}"
    environment:
      - API_BASE_URL=http://api:${API_PORT:-8000}
    depends_on:
      api:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

networks:
  default:
    name: hng_network
