version: '3.8'
services:
  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - hng_network

  api:
    build: ./api
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
    networks:
      - hng_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  worker:
    build: ./worker
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hng_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  hng_network:
    name: hng_internal
